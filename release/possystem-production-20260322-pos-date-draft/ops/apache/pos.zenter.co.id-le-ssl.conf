<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName pos.zenter.co.id
    ServerAdmin webmaster@localhost

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:8081/ retry=0 timeout=120
    ProxyPassReverse / http://127.0.0.1:8081/

    ErrorLog ${APACHE_LOG_DIR}/pos.zenter.co.id_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/pos.zenter.co.id_ssl_access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/pos.zenter.co.id/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/pos.zenter.co.id/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
