<VirtualHost *:80>
    ServerName pos.zenter.co.id
    ServerAdmin webmaster@localhost

    ErrorLog ${APACHE_LOG_DIR}/pos.zenter.co.id-error.log
    CustomLog ${APACHE_LOG_DIR}/pos.zenter.co.id-access.log combined

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
